name: Feature request
description: Suggest a new feature or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem does this solve?
      validations:
        required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you solve it?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: textarea
    id: effort
    attributes:
      label: Estimated effort
      description: Hours / days / "no idea"
